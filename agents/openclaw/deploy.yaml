apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      containers:
        - name: openclaw
          image: ghcr.io/nightwhite/openclaw:dev-a3ecdc5cec91
          imagePullPolicy: IfNotPresent
          args: ["start"]
          workingDir: /workspace
