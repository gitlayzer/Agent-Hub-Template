name: hermes
version: "2026.4.13"
base: ubuntu
image:
  repository: agent-hub/hermes
  tag: dev
source:
  type: git
  repository: https://github.com/NousResearch/hermes-agent.git
  ref: v2026.4.13
build:
  args:
    HERMES_GIT_URL: https://github.com/NousResearch/hermes-agent.git
    HERMES_REF: v2026.4.13
    HERMES_EXTRAS: cron,cli,pty,mcp,acp,web
runtime:
  entrypoint: /opt/agent/entrypoint.sh
  healthcheck: /opt/agent/healthcheck.sh
  user: agent
metadata:
  description: Real Hermes Agent runtime image built from the official NousResearch/hermes-agent source.
  category: platform-agent
