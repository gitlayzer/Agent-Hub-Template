id: change-me
name: Change Me
shortName: ChangeMe
description: Replace this scaffold with the Agent Hub catalog metadata for the new agent.
image: agent-hub/change-me:dev
port: 8080
defaultArgs:
  - start
backendSupported: true
workingDir: /workspace
manifestDir: manifests
user: agent
presentation:
  logoKey: change-me
  brandColor: "#2563eb"
  docsLabel: Web UI
workspaces:
  - key: overview
    label: Overview
  - key: web-ui
    label: Web UI
  - key: files
    label: Files
  - key: settings
    label: Settings
access:
  - key: web-ui
    label: Web UI
    path: /
  - key: terminal
    label: Terminal
  - key: files
    label: Files
    rootPath: /workspace
  - key: ssh
    label: SSH
actions:
  - key: open-terminal
    label: Terminal
  - key: open-files
    label: Files
  - key: open-settings
    label: Settings
  - key: run
    label: Start
  - key: pause
    label: Pause
  - key: delete
    label: Delete
settings:
  runtime:
    - key: cpu
      label: CPU
      type: quantity
      required: true
      binding:
        kind: runtime
        key: cpu
    - key: memory
      label: Memory
      type: quantity
      required: true
      binding:
        kind: runtime
        key: memory
    - key: storage
      label: Storage
      type: quantity
      required: true
      binding:
        kind: runtime
        key: storage
  agent:
    - key: provider
      label: Provider
      type: select
      required: true
      binding:
        kind: agent
        key: modelProvider
      rebootstrap: true
      options:
        - value: custom:aiproxy-chat
          label: AI-Proxy - Chat Completions
        - value: custom:aiproxy-responses
          label: AI-Proxy - Responses API
    - key: model
      label: Model
      type: select
      required: true
      binding:
        kind: agent
        key: model
      rebootstrap: true
    - key: baseURL
      label: Base URL
      type: url
      required: true
      binding:
        kind: agent
        key: modelBaseURL
      rebootstrap: true
    - key: keySource
      label: Key Source
      type: text
      readOnly: true
      binding:
        kind: derived
        key: keySource
regionModelPresets:
  us:
    - value: gpt-5.4-mini
      label: GPT-5.4 Mini
      helper: OpenAI
      provider: custom:aiproxy-responses
      apiMode: codex_responses
  cn:
    - value: qwen3-coder-plus
      label: Qwen3 Coder Plus
      helper: Qwen
      provider: custom:aiproxy-chat
      apiMode: chat_completions
